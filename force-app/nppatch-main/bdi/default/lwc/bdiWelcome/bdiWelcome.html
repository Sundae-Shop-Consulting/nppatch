<template>
    <lightning-card>
        <div class="slds-p-around_large">
            <div class="welcome-header">
                <h1 class="slds-text-heading_large">Batch Data Import</h1>
                <p class="welcome-subtitle">
                    Import contacts, donations, and related data from CSV files
                    into Salesforce using the NPPatch data import engine.
                </p>
            </div>

            <!-- Stats row -->
            <div class="stats-row slds-m-top_large slds-m-bottom_large">
                <div class="stat-card">
                    <span class="stat-value">{stats.openBatches}</span>
                    <span class="stat-label">Open Batches</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">{stats.pendingRecords}</span>
                    <span class="stat-label">Records Pending</span>
                </div>
                <template lwc:if={hasFailures}>
                    <div class="stat-card attention">
                        <span class="stat-value">{stats.failedRecords}</span>
                        <span class="stat-label">Records Failed</span>
                    </div>
                </template>
            </div>

            <!-- How it works -->
            <div class="info-section">
                <h2 class="slds-text-heading_medium slds-m-bottom_small">How It Works</h2>
                <div class="steps-grid">
                    <div class="info-step">
                        <div class="step-number">1</div>
                        <h3 class="step-title">Upload</h3>
                        <p class="step-desc">
                            Select a CSV file from your computer. The first row
                            should contain column headers that describe the data.
                        </p>
                    </div>
                    <div class="info-step">
                        <div class="step-number">2</div>
                        <h3 class="step-title">Map Fields</h3>
                        <p class="step-desc">
                            Match each CSV column to a Data Import field. Common
                            fields like name, email, and donation amount are
                            auto-matched when column names align.
                        </p>
                    </div>
                    <div class="info-step">
                        <div class="step-number">3</div>
                        <h3 class="step-title">Review &amp; Import</h3>
                        <p class="step-desc">
                            Confirm your mappings, name the batch, and import.
                            Use Dry Run to validate without creating records, or
                            import directly.
                        </p>
                    </div>
                    <div class="info-step">
                        <div class="step-number">4</div>
                        <h3 class="step-title">Process</h3>
                        <p class="step-desc">
                            The import engine matches contacts and accounts,
                            creates donations, and links everything together
                            using your org's matching rules.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Field categories -->
            <div class="info-section slds-m-top_large">
                <h2 class="slds-text-heading_medium slds-m-bottom_small">What Can You Import?</h2>
                <div class="category-grid">
                    <div class="category-item">
                        <lightning-icon icon-name="standard:contact" size="small"></lightning-icon>
                        <span>Contacts (primary &amp; secondary)</span>
                    </div>
                    <div class="category-item">
                        <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
                        <span>Accounts (primary &amp; secondary)</span>
                    </div>
                    <div class="category-item">
                        <lightning-icon icon-name="standard:opportunity" size="small"></lightning-icon>
                        <span>Donations &amp; memberships</span>
                    </div>
                    <div class="category-item">
                        <lightning-icon icon-name="standard:currency" size="small"></lightning-icon>
                        <span>Payments</span>
                    </div>
                    <div class="category-item">
                        <lightning-icon icon-name="standard:address" size="small"></lightning-icon>
                        <span>Home addresses</span>
                    </div>
                    <div class="category-item">
                        <lightning-icon icon-name="standard:campaign" size="small"></lightning-icon>
                        <span>Campaign membership</span>
                    </div>
                    <div class="category-item">
                        <lightning-icon icon-name="standard:partners" size="small"></lightning-icon>
                        <span>GAU allocations</span>
                    </div>
                    <div class="category-item">
                        <lightning-icon icon-name="standard:record" size="small"></lightning-icon>
                        <span>Recurring donations</span>
                    </div>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
